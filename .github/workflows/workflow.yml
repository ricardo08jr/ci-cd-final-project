name: Fluxo de trabalho de CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Instalar dependências
        run: npm ci
      - name: Lint com ESLint
        run: npm run lint
      - name: Run unit tests with Jest
        run: npm test
